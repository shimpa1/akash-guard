apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "akash-guard.fullname" . }}
  labels:
    {{- include "akash-guard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "akash-guard.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "akash-guard.fullname" . }}
    namespace: {{ include "akash-guard.namespace" . }}
