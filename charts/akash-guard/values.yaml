image:
  repository: shimpa/akash-guard
  tag: latest
  pullPolicy: Always

# Kubernetes namespace to deploy into.
# akash-guard requires access to cluster-wide resources — kube-system is recommended.
namespace: kube-system

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# akash-guard configuration — maps directly to config.yaml
config:
  threatintel:
    # How often to re-fetch all feeds and sync the Calico policy.
    refresh_interval: 1h
    # Line-delimited IP/CIDR blocklist URLs.
    feeds:
      - https://feodotracker.abuse.ch/downloads/ipblocklist.txt
      - https://www.spamhaus.org/drop/drop.txt
      - https://www.spamhaus.org/drop/edrop.txt

  anomaly:
    # Length of each evaluation window. Counters reset after each window.
    window: 10s
    thresholds:
      # Packets per second from a single namespace before alerting.
      pps: 10000
      # Unique destination IPs seen in one window before alerting.
      unique_dst_ips: 500
      # New outbound TCP connections to port 25 in one window.
      port25_connections: 20
      # SYN packets per second from a single namespace before alerting.
      syn_rate: 1000
      # high_pps only fires when avg packet size is below this (bytes).
      # Prevents false positives from bulk downloads / AI model pulls.
      # Set to 0 to disable the size guard.
      min_packet_bytes: 300

  alerting:
    prometheus:
      enabled: true
      port: 9090
    webhook:
      enabled: false
      url: ""
    email:
      enabled: false
      smtp_host: ""
      smtp_port: 587
      username: ""
      password: ""
      from: ""
      to: []

  namespaces:
    # Only alert on namespaces matching this regex.
    # Akash workload namespaces are 45-char lowercase alphanumeric lease IDs.
    # Leave empty to monitor all namespaces.
    monitor_pattern: "^[a-z0-9]{45}$"
    whitelist: []
