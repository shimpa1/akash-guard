---
# akash-guard trigger tester
#
# Deploys a container that intentionally triggers all 4 akash-guard detection
# signals. Use this to verify alerts are firing after deploying akash-guard.
#
# Detection signals triggered (default thresholds, 10s window):
#   port25_egress       — >20 TCP connections to port 25         (test: 30)
#   high_unique_dst_ips — >500 unique destination IPs            (test: 768 via nmap)
#   high_syn_rate       — >1000 SYN/sec                         (test: hping3 SYN flood)
#   high_pps            — >10000 pps, avg packet < 300 bytes    (test: hping3 UDP flood)
#
# Watch for alerts after deploying:
#   kubectl -n kube-system logs -l app=akash-guard -f | grep "anomaly:"

version: "2.0"

services:
  guard-tester:
    image: shimpa/akash-guard-tester:latest

profiles:
  compute:
    guard-tester:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 256Mi
        storage:
          - size: 512Mi
  placement:
    akash:
      pricing:
        guard-tester:
          denom: uakt
          amount: 100

deployment:
  guard-tester:
    akash:
      profile: guard-tester
      count: 1
