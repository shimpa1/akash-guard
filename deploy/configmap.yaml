apiVersion: v1
kind: ConfigMap
metadata:
  name: akash-guard-config
  namespace: kube-system
data:
  config.yaml: |
    threatintel:
      refresh_interval: 1h
      feeds:
        - https://feodotracker.abuse.ch/downloads/ipblocklist.txt
        - https://www.spamhaus.org/drop/drop.txt
        - https://www.spamhaus.org/drop/edrop.txt

    anomaly:
      window: 10s
      thresholds:
        pps: 10000
        unique_dst_ips: 500
        port25_connections: 20
        syn_rate: 1000
        min_packet_bytes: 300

    alerting:
      prometheus:
        enabled: true
        port: 9090
      webhook:
        enabled: false
        url: ""
      email:
        enabled: false
        smtp_host: ""
        smtp_port: 587
        from: ""
        to: []

    namespaces:
      # Only alert on Akash workload namespaces (45-char lowercase alphanumeric).
      # Leave empty to monitor all namespaces (use whitelist to exclude specific ones).
      monitor_pattern: "^[a-z0-9]{45}$"
      whitelist: []

    enforcement:
      # When enabled, the eBPF TC hook rate-limits the offending interface to
      # rate_limit_bps bytes/sec for the cooldown duration after each alert.
      # Stats recording is unaffected — detection continues while enforcement is active.
      enabled: true
      rate_limit_bps: 1000000  # 1 Mbps
      cooldown: 5m
