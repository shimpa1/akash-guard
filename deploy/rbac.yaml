apiVersion: v1
kind: ServiceAccount
metadata:
  name: akash-guard
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: akash-guard
rules:
  # Read nodes and pods to resolve veth → namespace/pod mappings
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
  # Manage Calico GlobalNetworkPolicy CRDs
  - apiGroups: ["crd.projectcalico.org"]
    resources: ["globalnetworkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: akash-guard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: akash-guard
subjects:
  - kind: ServiceAccount
    name: akash-guard
    namespace: kube-system
