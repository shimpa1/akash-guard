# Grafana — pre-provisioned with Loki datasource and akash-guard dashboard.
#
# Chart: grafana/grafana
# Tested version: 8.4.1
#
# Access: https://grafana.europlots.net  (admin / see adminPassword below)
# Change adminPassword before deploying to a non-test environment.
#
# Prerequisites: cert-manager installed with letsencrypt-prod ClusterIssuer.
#   Run: bash deploy/cert-manager/install.sh

adminPassword: akash-guard

service:
  type: ClusterIP

ingress:
  enabled: true
  ingressClassName: akash-ingress-class
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - grafana.europlots.net
  tls:
    - secretName: grafana-tls
      hosts:
        - grafana.europlots.net

# Pre-provision Loki as the default datasource
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 5000

# Dashboard provider — watches /var/lib/grafana/dashboards/default
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: akash-guard
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

# Pre-provisioned dashboard for akash-guard abuse detection
dashboards:
  default:
    akash-guard:
      json: |
        {
          "annotations": {"list": []},
          "editable": true,
          "fiscalYearStartMonth": 0,
          "graphTooltip": 0,
          "links": [],
          "panels": [
            {
              "datasource": {"type": "loki", "uid": "${datasource}"},
              "gridPos": {"h": 9, "w": 24, "x": 0, "y": 0},
              "id": 1,
              "options": {
                "dedupStrategy": "none",
                "enableLogDetails": true,
                "prettifyLogMessage": true,
                "showCommonLabels": false,
                "showLabels": true,
                "showTime": true,
                "sortOrder": "Descending",
                "wrapLogMessage": false
              },
              "targets": [
                {
                  "datasource": {"type": "loki", "uid": "${datasource}"},
                  "expr": "{k8s_label_app=\"akash-guard\"} | json | msg=\"abuse detected\"",
                  "queryType": "range",
                  "refId": "A"
                }
              ],
              "title": "Abuse Alerts",
              "type": "logs"
            },
            {
              "datasource": {"type": "loki", "uid": "${datasource}"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "palette-classic"},
                  "custom": {"lineWidth": 2, "fillOpacity": 10},
                  "unit": "short"
                },
                "overrides": []
              },
              "gridPos": {"h": 8, "w": 12, "x": 0, "y": 9},
              "id": 2,
              "options": {
                "legend": {"calcs": ["sum"], "displayMode": "list", "placement": "bottom"},
                "tooltip": {"mode": "multi"}
              },
              "targets": [
                {
                  "datasource": {"type": "loki", "uid": "${datasource}"},
                  "expr": "sum by (type) (count_over_time({k8s_label_app=\"akash-guard\"} | json | msg=\"abuse detected\" [$__interval]))",
                  "queryType": "range",
                  "legendFormat": "{{type}}",
                  "refId": "A"
                }
              ],
              "title": "Alerts by Type",
              "type": "timeseries"
            },
            {
              "datasource": {"type": "loki", "uid": "${datasource}"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "palette-classic"},
                  "custom": {"lineWidth": 2, "fillOpacity": 10},
                  "unit": "short"
                },
                "overrides": []
              },
              "gridPos": {"h": 8, "w": 12, "x": 12, "y": 9},
              "id": 3,
              "options": {
                "legend": {"calcs": ["sum"], "displayMode": "list", "placement": "bottom"},
                "tooltip": {"mode": "multi"}
              },
              "targets": [
                {
                  "datasource": {"type": "loki", "uid": "${datasource}"},
                  "expr": "sum by (k8s_namespace_name) (count_over_time({k8s_label_app=\"akash-guard\"} | json | msg=\"abuse detected\" [$__interval]))",
                  "queryType": "range",
                  "legendFormat": "{{k8s_namespace_name}}",
                  "refId": "A"
                }
              ],
              "title": "Alerts by Namespace",
              "type": "timeseries"
            },
            {
              "datasource": {"type": "loki", "uid": "${datasource}"},
              "fieldConfig": {
                "defaults": {
                  "color": {"mode": "thresholds"},
                  "thresholds": {
                    "mode": "absolute",
