# Loki — single-binary mode, local filesystem storage.
# Suitable for a single-node cluster. Scale out with object storage for multi-node.
#
# Chart: grafana/loki
# Tested version: 6.6.3

deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    retention_period: 720h   # 30 days
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_label_names_per_series: 30

  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi

# Disable distributed components (not needed for single-binary)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

chunksCache:
  enabled: false

resultsCache:
  enabled: false

minio:
  enabled: false

gateway:
  enabled: false

lokiCanary:
  enabled: false

test:
  enabled: false
