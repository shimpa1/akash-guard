apiVersion: v1
kind: ConfigMap
metadata:
  name: akash-guard-dashboard
  # Deploy to the same namespace as Grafana (typically monitoring for kube-prometheus-stack)
  namespace: monitoring
  labels:
    # kube-prometheus-stack's grafana-sc-dashboard sidecar watches for this label
    # and hot-loads the dashboard into Grafana without a pod restart.
    grafana_dashboard: "1"
data:
  akash-guard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "gridPos": {
            "h": 9,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": true,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "expr": "{k8s_label_app=\"akash-guard\"} | json | msg=\"abuse detected\"",
              "queryType": "range",
              "refId": "A"
            }
          ],
          "title": "Abuse Alerts",
          "type": "logs"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 9
          },
          "id": 2,
          "options": {
            "legend": {
              "calcs": [
                "sum"
              ],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "multi"
            }
          },
          "targets": [
            {
              "datasource": {
                "type": "loki",
                "uid": "${datasource}"
              },
              "expr": "sum by (type) (count_over_time({k8s_label_app=\"akash-guard\"} | json | msg=\"abuse detected\" [$__interval]))",
              "queryType": "range",
              "legendFormat": "{{type}}",
              "refId": "A"
            }
          ],
          "title": "Alerts by Type",
          "type": "timeseries"
        },
        {
          "datasource": {
            "type": "loki",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "color": {
