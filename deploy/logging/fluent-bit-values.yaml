# Fluent Bit — DaemonSet log collector.
# Tails all pod logs from /var/log/containers, enriches with Kubernetes metadata,
# and ships to Loki with per-pod labels.
#
# Chart: fluent/fluent-bit
# Tested version: 0.47.10
#
# Label extraction strategy:
# 1. kubernetes filter adds a nested `kubernetes` object with pod metadata
# 2. First NEST lift flattens kubernetes.* → k8s_* top-level fields
# 3. Second NEST lift flattens kubernetes.labels.* → k8s_label_* top-level fields
# 4. Loki output uses k8s_namespace_name, k8s_pod_name, k8s_label_app as Loki labels
#    and removes the rest of the k8s_* metadata from the log body
#
# Note: the `Labels {key="$nested['field']"}` syntax is not supported in Fluent Bit 3.x.
# Use the NEST filter + label_keys approach shown here instead.

tolerations:
  - operator: Exists   # run on every node including control-plane

config:
  service: |
    [SERVICE]
        Daemon          Off
        Flush           5
        Log_Level       warn
        Parsers_File    /fluent-bit/etc/parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On
        Annotations         Off

    [FILTER]
        Name         nest
        Match        kube.*
        Operation    lift
        Nested_under kubernetes
        Add_prefix   k8s_

    [FILTER]
        Name         nest
        Match        kube.*
        Operation    lift
        Nested_under k8s_labels
        Add_prefix   k8s_label_

  outputs: |
    [OUTPUT]
        Name        loki
        Match       kube.*
        Host        loki.monitoring.svc.cluster.local
        Port        3100
        Labels      job=fluent-bit
        label_keys  $k8s_namespace_name,$k8s_pod_name,$k8s_label_app
        line_format json
        remove_keys k8s_pod_id,k8s_host,k8s_container_name,k8s_container_image,k8s_docker_id,k8s_container_hash,stream
